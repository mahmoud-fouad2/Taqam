# Render Build Configuration
# https://render.com/docs/yaml-spec

services:
  - type: web
    # Keep the existing Render service identifier stable until a coordinated migration is planned.
    name: ujoor
    runtime: node
    region: frankfurt # Closest to Middle East
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install && SKIP_BUILD_VALIDATION=true NODE_OPTIONS=--max-old-space-size=448 pnpm build
    startCommand: pnpm start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: DISABLE_SENTRY_BUILD
        value: "true"
      - key: SKIP_BUILD_VALIDATION
        value: "true"
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPPORT_EMAIL
        sync: false
      - key: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
