# Render Build Configuration
# https://render.com/docs/yaml-spec

services:
  - type: web
    # Keep the existing Render service identifier stable until a coordinated migration is planned.
    name: taqam
    runtime: node
    region: frankfurt # Closest to Middle East
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile && rm -rf .next && SKIP_BUILD_VALIDATION=true NEXT_DISABLE_STANDALONE_OUTPUT=true NODE_OPTIONS=--max-old-space-size=3072 pnpm build:webpack && rm -rf .next/standalone
    preDeployCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm db:migrate:prod
    startCommand: corepack pnpm start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: DISABLE_SENTRY_BUILD
        value: "true"
      - key: NEXT_DISABLE_STANDALONE_OUTPUT
        value: "true"
      - key: SKIP_BUILD_VALIDATION
        value: "true"
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: INTEGRATION_SYNC_CRON_SECRET
        sync: false
      - key: TAQAM_BASE_DOMAIN
        sync: false
      - key: TAQAM_TENANT_URL_MODE
        sync: false
      - key: NEXT_PUBLIC_TAQAM_TENANT_URL_MODE
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SUPPORT_EMAIL
        sync: false
      - key: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: MOBILE_JWT_SECRET
        generateValue: true
      - key: ALLOW_INSECURE_SEED_DEFAULTS
        value: "false"

  - type: cron
    name: taqam-integration-sync-cron
    runtime: node
    region: frankfurt
    plan: starter
    schedule: "0 * * * *"
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile
    startCommand: node scripts/run-integration-sync-cron.mjs
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: INTEGRATION_SYNC_CRON_TARGET_URL
        sync: false
      - key: INTEGRATION_SYNC_CRON_SECRET
        sync: false
