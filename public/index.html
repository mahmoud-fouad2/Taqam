<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taqam</title>
    <style>
      body {
        margin: 0;
      }

      .shell {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        padding: 24px;
      }

      .shell h1 {
        margin: 0 0 8px;
      }

      .shell p {
        margin: 0;
      }

      .shell .lead {
        margin-bottom: 12px;
        color: #444;
      }

      .shell .hint {
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <noscript>This app requires JavaScript.</noscript>
    <div class="shell">
      <h1>Taqam</h1>
      <p class="lead">
        This Android APK is a Capacitor wrapper. Configure <code>CAP_SERVER_URL</code> (e.g.
        <code>http://192.168.1.10:3000</code>) to point to a running Next.js server.
      </p>
      <p class="hint">
        If you see this page inside the app, it means <code>CAP_SERVER_URL</code> is not set.
      </p>
    </div>
  </body>
</html>
