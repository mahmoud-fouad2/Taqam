<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="taqamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A8C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Arabic طاقم text stylized -->
  <text
    x="200"
    y="155"
    font-family="'Arial', 'Segoe UI', sans-serif"
    font-size="110"
    font-weight="900"
    text-anchor="middle"
    fill="url(#taqamGrad)"
    letter-spacing="-2"
  >طاقم</text>
  <!-- TAQAM English text -->
  <text
    x="200"
    y="215"
    font-family="'Arial', 'Segoe UI', sans-serif"
    font-size="42"
    font-weight="700"
    text-anchor="middle"
    fill="#1565C0"
    letter-spacing="8"
  >TAQAM</text>
</svg>
