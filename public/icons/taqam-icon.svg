<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="100" height="50" rx="24" fill="url(#shine)"/>

  <!-- T mark: horizontal crossbar -->
  <rect x="15" y="24" width="70" height="17" rx="8.5" fill="white"/>
  <!-- T mark: vertical stem -->
  <rect x="41.5" y="24" width="17" height="52" rx="8.5" fill="white" opacity="0.92"/>

  <!-- Subtle inner glow accent dot -->
  <circle cx="50" cy="76" r="4" fill="white" opacity="0.45"/>
</svg>
